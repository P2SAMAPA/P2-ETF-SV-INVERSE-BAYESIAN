name: Daily SV Inverse Training

on:
  schedule:
    - cron: '0 04 * * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python train.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
